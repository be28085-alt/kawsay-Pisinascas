name: Deploy Vite site to Pages

on:
  push:
    branches: [ "main" ]

permissions:
  contents: read
  pages: write
  id-token: write

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Configure git to ignore submodules
        run: git config --global submodule.recurse false

      - uses: actions/checkout@v4
        with:
          submodules: 'false'
          fetch-depth: 0

      - name: Remove any submodule references
        run: |
          rm -f .gitmodules
          rm -rf .git/modules

      - uses: actions/setup-node@v4
        with:
          node-version: 20

      - run: npm install
      - run: npm run build

      - uses: actions/upload-pages-artifact@v3
        with:
          path: ./dist

  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}

    needs: build
    runs-on: ubuntu-latest

    steps:
      - uses: actions/deploy-pages@v4
